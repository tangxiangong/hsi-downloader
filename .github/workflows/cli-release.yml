name: CLI Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_TARGET_DIR: target
  APP_NAME: hsi

jobs:
  package-cli:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_suffix: linux-x86_64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact_suffix: linux-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_suffix: windows-x86_64
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            artifact_suffix: windows-arm64
          - os: macos-13
            target: x86_64-apple-darwin
            artifact_suffix: macos-x86_64
          - os: macos-15
            target: aarch64-apple-darwin
            artifact_suffix: macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: cli-release-${{ matrix.target }}

      - name: Build CLI with TUI
        run: cargo build -p hsi-cli --release --target ${{ matrix.target }} --locked

      - name: Prepare CLI artifacts on Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${APP_NAME}" "dist/${APP_NAME}"
          tar -C dist -czf "dist/${APP_NAME}-cli-${{ matrix.artifact_suffix }}-tui.tar.gz" "${APP_NAME}"

      - name: Prepare CLI artifacts on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${env:APP_NAME}.exe" "dist/${env:APP_NAME}.exe"
          Compress-Archive -Path "dist/${env:APP_NAME}.exe" -DestinationPath "dist/${env:APP_NAME}-cli-${{ matrix.artifact_suffix }}-tui.zip" -Force

      - name: Build CLI without TUI
        run: cargo build -p hsi-cli --release --target ${{ matrix.target }} --no-default-features --locked

      - name: Prepare non-TUI artifacts on Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist-no-tui
          cp "target/${{ matrix.target }}/release/${APP_NAME}" "dist-no-tui/${APP_NAME}"
          tar -C dist-no-tui -czf "dist/${APP_NAME}-cli-${{ matrix.artifact_suffix }}-no-tui.tar.gz" "${APP_NAME}"

      - name: Prepare non-TUI artifacts on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist-no-tui | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${env:APP_NAME}.exe" "dist-no-tui/${env:APP_NAME}.exe"
          Compress-Archive -Path "dist-no-tui/${env:APP_NAME}.exe" -DestinationPath "dist/${env:APP_NAME}-cli-${{ matrix.artifact_suffix }}-no-tui.zip" -Force

      - name: Upload CLI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.artifact_suffix }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error
